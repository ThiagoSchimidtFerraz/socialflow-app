[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*; connect-src 'self' https://goeufonywhlzifzyehtg.supabase.co wss://goeufonywhlzifzyehtg.supabase.co;"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Redirecionamentos para as páginas secundárias (opcional, Netlify detecta .html automaticamente)
[[redirects]]
  from = "/master"
  to = "/master.html"
  status = 200

[[redirects]]
  from = "/portal"
  to = "/portal-cliente.html"
  status = 200
