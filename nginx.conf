server {
    listen 80;
    server_name _; # Coloque seu domínio ou IP aqui

    root /var/www/socialflow;
    index index.html;

    # Gzip para performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        # Tenta encontrar o arquivo físico, se não existir, envia para o index.html (SPA routing)
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos (30 dias)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Negar acesso a arquivos sensíveis
    location ~ /\. {
        deny all;
    }
}
